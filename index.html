<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fluxo de Caixa Delivery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container mt-4">

<h2 class="mb-4">💰 Fluxo de Caixa Delivery</h2>

<div class="row mb-4">

<div class="col-md-4">
<div class="card text-center">
<div class="card-body">
<h6>Vendas</h6>
<h3 id="vendas">0</h3>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card text-center">
<div class="card-body">
<h6>Gastos</h6>
<h3 id="gastos">0</h3>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card text-center">
<div class="card-body">
<h6>Lucro</h6>
<h3 id="lucro">0</h3>
</div>
</div>
</div>

</div>

<div class="card mb-4">
<div class="card-body">

<h5>Adicionar Transação</h5>

<form id="form">

<div class="row">

<div class="col-md-3">
<input class="form-control" placeholder="Descrição" id="descricao">
</div>

<div class="col-md-2">
<input class="form-control" type="number" placeholder="Valor" id="valor">
</div>

<div class="col-md-2">
<select class="form-control" id="tipo">
<option value="entrada">Entrada</option>
<option value="saida">Saída</option>
</select>
</div>

<div class="col-md-2">
<select class="form-control" id="plataforma">
<option value="direto">Direto</option>
<option value="ifood">iFood</option>
<option value="99food">99Food</option>
</select>
</div>

<div class="col-md-2">
<input class="form-control" type="date" id="data">
</div>

<div class="col-md-1">
<button class="btn btn-primary w-100">OK</button>
</div>

</div>

</form>

</div>
</div>

<div class="card mb-4">
<div class="card-body">

<h5>📅 Movimentações</h5>

<table class="table">
<thead>
<tr>
<th>Data</th>
<th>Descrição</th>
<th>Plataforma</th>
<th>Valor</th>
<th>Taxa</th>
<th>Líquido</th>
</tr>
</thead>

<tbody id="contasMes"></tbody>

</table>

</div>
</div>

<div class="card mb-4">
<div class="card-body">

<h5>📊 Dashboard</h5>
<canvas id="grafico"></canvas>

</div>
</div>

<div class="card mb-4">
<div class="card-body">

<h5>📈 Relatório Mensal</h5>

<table class="table">
<thead>
<tr>
<th>Mês</th>
<th>Entradas</th>
<th>Saídas</th>
<th>Lucro</th>
</tr>
</thead>

<tbody id="relatorio"></tbody>

</table>

</div>
</div>

</div>

<script src="supabase.js"></script>
<script src="app.js"></script>

</body>
</html>
